name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" -c constraints.txt
      - name: Run tests
        env:
          RAG_RETRIEVAL_BACKEND: sparse
        run: pytest -q
      - name: Run static lint
        run: ruff check .
      - name: Validate skill package
        run: python scripts/validate_skill_package.py --skill-root .
      - name: Build lightweight skill bundle
        run: python scripts/build_skill_bundle.py --skill-root . --output dist/radiotherapy-physics-rag-light.zip
